name: CI — Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar ruff
        run: pip install "ruff>=0.4.0"

      - name: Verificar estilo (ruff check)
        run: ruff check .

      - name: Verificar formatação (ruff format)
        run: ruff format --check .
